<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Messages</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>Messages</h1>
      </div>
      <div class="search-container">
        <input type="search" id="search" placeholder="Search" autocomplete="off">
      </div>
      <div id="chat-list"></div>
    </aside>
    <main id="conversation">
      <div id="conversation-header">
        <button id="back-btn" aria-label="Back">&lsaquo;</button>
        <div id="conversation-title">Messages</div>
      </div>
      <div id="messages">
        <div class="empty-state">Select a conversation</div>
      </div>
      <div id="compose" class="hidden">
        <div class="compose-inner">
          <input type="text" id="message-input" placeholder="iMessage" autocomplete="off">
          <button id="send-btn" aria-label="Send" disabled>
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z" fill="currentColor"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
